<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AegisTask Pro — Enterprise Task Lifecycle Space</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="fa-solid fa-layer-group brand-icon"></i>
                <h2>AegisTask <span>Pro</span></h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active"><i class="fa-solid fa-gauge"></i> Workspace Dashboard</a>
                <a href="#" class="nav-item" id="themeToggle"><i class="fa-solid fa-circle-half-stroke"></i> Contrast Matrix</a>
            </nav>
            
            <div class="sidebar-io-panel">
                <button id="exportDataBtn" class="btn btn-secondary btn-sm"><i class="fa-solid fa-download"></i> Export Workspace</button>
                <label for="importDataFile" class="btn btn-secondary btn-sm import-label">
                    <i class="fa-solid fa-upload"></i> Import Backup
                </label>
                <input type="file" id="importDataFile" accept=".json" style="display: none;">
            </div>

            <div class="sidebar-stats">
                <div class="stat-mini">
                    <span class="stat-label">Productivity Yield</span>
                    <span class="stat-val" id="efficiencyMetric">0%</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="globalProgressBar" style="width: 0%"></div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="globalSearchInput" placeholder="Fuzzy find tasks by title, description, or subtasks...">
                </div>
                <div class="action-wrapper">
                    <button id="openModalBtn" class="btn btn-primary">
                        <i class="fa-solid fa-plus"></i> Initialize Task
                    </button>
                </div>
            </header>

            <section class="analytics-row">
                <div class="metric-card">
                    <div class="metric-icon blue"><i class="fa-solid fa-list-check"></i></div>
                    <div class="metric-info">
                        <h4 id="totalTasksCount">0</h4>
                        <p>Total Backlog</p>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-icon amber"><i class="fa-solid fa-spinner"></i></div>
                    <div class="metric-info">
                        <h4 id="inProgressCount">0</h4>
                        <p>Active Sprints</p>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-icon green"><i class="fa-solid fa-circle-check"></i></div>
                    <div class="metric-info">
                        <h4 id="completedTasksCount">0</h4>
                        <p>Resolved Nodes</p>
                    </div>
                </div>
            </section>

            <section class="kanban-board">
                <div class="kanban-column" data-status="todo">
                    <div class="column-header">
                        <h3><span class="indicator todo-dot"></span> Backlog Storage</h3>
                        <div class="column-ctrl">
                            <select class="sort-select" data-column="todo">
                                <option value="default">Default Order</option>
                                <option value="priority">Sort: Risk Level</option>
                                <option value="deadline">Sort: Deadline</option>
                            </select>
                            <span class="task-badge" id="todoBadge">0</span>
                        </div>
                    </div>
                    <div class="column-cards-container" id="todoContainer"></div>
                </div>

                <div class="kanban-column" data-status="inprogress">
                    <div class="column-header">
                        <h3><span class="indicator progress-dot"></span> Active Processing</h3>
                        <div class="column-ctrl">
                            <select class="sort-select" data-column="inprogress">
                                <option value="default">Default Order</option>
                                <option value="priority">Sort: Risk Level</option>
                                <option value="deadline">Sort: Deadline</option>
                            </select>
                            <span class="task-badge" id="inprogressBadge">0</span>
                        </div>
                    </div>
                    <div class="column-cards-container" id="inprogressContainer"></div>
                </div>

                <div class="kanban-column" data-status="done">
                    <div class="column-header">
                        <h3><span class="indicator done-dot"></span> Verified Nodes</h3>
                        <div class="column-ctrl">
                            <select class="sort-select" data-column="done">
                                <option value="default">Default Order</option>
                                <option value="priority">Sort: Risk Level</option>
                                <option value="deadline">Sort: Deadline</option>
                            </select>
                            <span class="task-badge" id="doneBadge">0</span>
                        </div>
                    </div>
                    <div class="column-cards-container" id="doneContainer"></div>
                </div>
            </section>
        </main>
    </div>

    <div class="modal-backdrop" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Initialize Task Payload</h3>
                <button id="closeModalBtn" class="close-btn">&times;</button>
            </div>
            <form id="taskForm">
                <input type="hidden" id="taskIdField">
                <div class="form-group">
                    <label for="taskTitle">Task Header Label</label>
                    <input type="text" id="taskTitle" required placeholder="Describe task node summary...">
                </div>
                <div class="form-group">
                    <label for="taskDesc">Detailed Architecture Log</label>
                    <textarea id="taskDesc" rows="2" placeholder="Log details, scope parameters..."></textarea>
                </div>
                <div class="form-group">
                    <label for="taskSubtasks">Subtask Checklist (Comma-Separated Elements)</label>
                    <input type="text" id="taskSubtasks" placeholder="e.g., Setup Environment, Write Database Mock, Run Profiler">
                </div>
                <div class="form-row">
                    <div class="form-group val-half">
                        <label for="taskPriority">Risk Priority Level</label>
                        <select id="taskPriority">
                            <option value="low">Low Priority</option>
                            <option value="medium" selected>Medium Priority</option>
                            <option value="high">High Emergency</option>
                        </select>
                    </div>
                    <div class="form-group val-half">
                        <label for="taskDeadline">Target Ephemeral Date</label>
                        <input type="date" id="taskDeadline" required>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancelModalBtn" class="btn btn-secondary">Abort</button>
                    <button type="submit" class="btn btn-primary">Commit Target</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
